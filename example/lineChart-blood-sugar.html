<html>

<head>
  <title>Time scale chart.js</title>
</head>
<style>
  .chartBox {
    width: 700px
  }
</style>

<body>
  <div class="chartBox">
    <canvas id="myChart"></canvas>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

  <script src="https://cdn.jsdelivr.net/npm/chartjs-adapter-date-fns/dist/chartjs-adapter-date-fns.bundle.min.js"></script>

  <script src="./../src/chartjs-plugin-trendline.js"></script>

  <script>
    const data = {
      "labels": [
    "2023-08-10 20:00:00",
    "2023-08-10 21:30:00",
    "2023-08-10 22:30:30",
    "2023-08-11 07:00:00",
    "2023-08-11 07:15:00",
    "2023-08-11 08:00:00"
  ],
  "datasets": [
    {
      "type": "line",
      "label": "Blood Sugar",
      "data": {
        "2023-08-10 21:30:00": "6.20",
        "2023-08-10 22:30:30": "6.60",
        "2023-08-11 07:00:00": "5.90",
        "2023-08-11 08:00:00": "4.60",
        "2023-08-11 11:17:00": "5.10",
        "2023-08-11 12:15:00": "4.90"
      },
      "backgroundColor": "#A9CCE3",
      "pointStyle": "circle",
      "pointRadius": 6,
      "pointHoverRadius": 12,
      "borderColor": "#5DADE2",
      "trendlineLinear": {
        "colorMin": "red",
        "colorMax": "green",
        "lineStyle": "dotted",
        "width": 3,
        "projection": true
      }
    }
  ],
    };
    const config = {
      type: 'line',
      data
    };
    console.log("Loaded");
    const myChart = new Chart(
      document.getElementById('myChart'),
      config,
    );
  </script>
</body>

</html>
